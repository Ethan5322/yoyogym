<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Gym Membership</title>

    <!-- Fonts preloaded to avoid flash of unstyled text (spec Part 6.4) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Pre-mount paint: keeps the screen dark (no white flash) and shows a
         premium shimmer skeleton until the React bundle mounts. Visual only. -->
    <style>
      html, body { margin: 0; background: #0a0a0a; }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .boot-skeleton { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 16px; }
      .boot-card {
        width: 100%; max-width: 480px; height: 80vh; padding: 22px;
        border-radius: 12px; border: 1px solid rgba(230, 57, 70, 0.15);
        background: rgba(10, 10, 10, 0.85); overflow: hidden;
      }
      .shmr {
        background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 100%);
        background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-skeleton">
        <div class="boot-card">
          <div class="shmr" style="height: 22px; width: 48%; border-radius: 6px; margin-bottom: 26px;"></div>
          <div class="shmr" style="height: 58px; margin-bottom: 14px;"></div>
          <div class="shmr" style="height: 58px; width: 72%; margin-bottom: 14px;"></div>
          <div class="shmr" style="height: 58px; width: 86%;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
