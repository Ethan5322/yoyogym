<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!-- Faint scattered gym-equipment silhouettes. Tiles every 300px.
       All shapes in barely-visible gym red (#E63946 @ 6% opacity). -->
  <g fill="#E63946" fill-opacity="0.06">

    <!-- Dumbbell (top-left, medium) -->
    <g transform="translate(40 52) rotate(-18)">
      <rect x="-26" y="-3" width="52" height="6" rx="3"/>
      <rect x="-34" y="-11" width="9" height="22" rx="3"/>
      <rect x="-44" y="-8" width="7" height="16" rx="3"/>
      <rect x="25" y="-11" width="9" height="22" rx="3"/>
      <rect x="37" y="-8" width="7" height="16" rx="3"/>
    </g>

    <!-- Kettlebell (top-right) -->
    <g transform="translate(232 58)">
      <path d="M-9 -20 a9 9 0 0 1 18 0 v6 a3 3 0 0 1 -3 3 h-12 a3 3 0 0 1 -3 -3 z" fill="none" stroke="#E63946" stroke-opacity="0.06" stroke-width="4"/>
      <path d="M0 -8 C16 -8 22 6 22 16 C22 27 11 32 0 32 C-11 32 -22 27 -22 16 C-22 6 -16 -8 0 -8 Z"/>
    </g>

    <!-- Barbell (center, large, slight tilt) -->
    <g transform="translate(150 150) rotate(-12)">
      <rect x="-70" y="-3" width="140" height="6" rx="3"/>
      <rect x="-78" y="-16" width="8" height="32" rx="3"/>
      <rect x="-90" y="-22" width="9" height="44" rx="4"/>
      <rect x="-102" y="-15" width="8" height="30" rx="3"/>
      <rect x="70" y="-16" width="8" height="32" rx="3"/>
      <rect x="81" y="-22" width="9" height="44" rx="4"/>
      <rect x="94" y="-15" width="8" height="30" rx="3"/>
    </g>

    <!-- Dumbbell (bottom-right, small) -->
    <g transform="translate(244 244) rotate(24)">
      <rect x="-18" y="-2.5" width="36" height="5" rx="2.5"/>
      <rect x="-24" y="-8" width="7" height="16" rx="3"/>
      <rect x="17" y="-8" width="7" height="16" rx="3"/>
    </g>

    <!-- Kettlebell (bottom-left, small) -->
    <g transform="translate(52 238)">
      <path d="M-6 -14 a6 6 0 0 1 12 0 v4 a2 2 0 0 1 -2 2 h-8 a2 2 0 0 1 -2 -2 z" fill="none" stroke="#E63946" stroke-opacity="0.06" stroke-width="3"/>
      <path d="M0 -6 C11 -6 15 4 15 11 C15 19 8 22 0 22 C-8 22 -15 19 -15 11 C-15 4 -11 -6 0 -6 Z"/>
    </g>

  </g>
</svg>
